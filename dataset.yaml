# Dataset configuration for YOLO training
# Update the paths and class information according to your dataset

# Path to dataset root directory
# This can be absolute or relative path
path: "A:/PROJECT/Line marking/yolo_dataset"  # UPDATE THIS

# Train/Val/Test image directories (relative to 'path')
train: images/train
val: images/val
#test: images/test  # optional

# Number of classes
nc: 20
names:
  [
    "car", "real ll", "virtual ll", "no passing", "bus", "truck",
    "zebra crossing", "straight line", "right turn", "stop line",
    "cross hatch", "sr turn", "turn around", "left turn",
    "diversion line", "sl turn", "guide ll", "rop", "lor", "slow down"
  ]

# Alternative format:
# names: ['class1', 'class2', 'class3']

# ===== Example configurations =====

# Example 1: COCO format
# path: /datasets/coco
# train: train2017.txt  # or images/train2017
# val: val2017.txt      # or images/val2017
# nc: 80
# names: ['person', 'bicycle', 'car', ...]

# Example 2: Custom dataset
# path: /home/user/my_dataset
# train: images/train
# val: images/val
# nc: 5
# names: ['dog', 'cat', 'bird', 'fish', 'rabbit']

# Example 3: Relative paths
# path: ./yolo_dataset
# train: train/images
# val: val/images
# test: test/images
# nc: 2
# names: ['background', 'object']

# ===== Directory Structure =====
# Your dataset should follow this structure:
#
# yolo_dataset/
# ├── images/
# │   ├── train/
# │   │   ├── image1.jpg
# │   │   ├── image2.jpg
# │   │   └── ...
# │   └── val/
# │       ├── image1.jpg
# │       ├── image2.jpg
# │       └── ...
# └── labels/
#     ├── train/
#     │   ├── image1.txt
#     │   ├── image2.txt
#     │   └── ...
#     └── val/
#         ├── image1.txt
#         ├── image2.txt
#         └── ...
#
# Each label file should have the same name as its corresponding image
# Label format (one object per line):
# <class_id> <x_center> <y_center> <width> <height>
# All coordinates are normalized (0-1)
# Example: 0 0.5 0.5 0.3 0.4

# ===== Tips =====
# 1. Ensure image and label files have matching names
# 2. All coordinates in label files must be normalized (0-1)
# 3. Class IDs start from 0
# 4. Each line in label file represents one object
# 5. Train/val split is typically 80/20 or 90/10
